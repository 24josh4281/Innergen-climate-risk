<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCI Climate Risk — 기후 물리적 리스크 조회</title>
  <link rel="stylesheet" href="style.css">
  <!-- Leaflet.js -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <!-- Tailwind (utility classes 보완용) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<!-- ── Warm-up Overlay ──────────────────────────────────── -->
<div id="warmup-overlay">
  <div class="warmup-spinner"></div>
  <strong>서버 웜업 중...</strong>
  <p id="warmup-msg">API 서버를 시작하는 중입니다. 최초 접속 시 약 30초가 소요됩니다.</p>
</div>

<!-- ── Header ───────────────────────────────────────────── -->
<header>
  <div class="container">
    <div class="logo">
      <div class="icon">🌍</div>
      OCI Climate Risk
    </div>
    <span style="margin-left: auto; font-size: 12px; color: var(--text-dim);">
      38동인 × 4SSP × 9시점 기후 물리적 리스크 분석
    </span>
  </div>
</header>

<!-- ── Hero ─────────────────────────────────────────────── -->
<main>
  <section class="hero">
    <div class="container">
      <h1>기후 물리적 리스크 즉시 조회</h1>
      <p>주소 또는 위도/경도를 입력하면 38개 기후 동인의 4 SSP 시나리오 × 9시점 리스크를 시각화합니다.</p>

      <!-- Search Card -->
      <div class="search-card">
        <div class="search-tabs">
          <button class="tab-btn active" data-tab="address">주소 입력</button>
          <button class="tab-btn" data-tab="latlon">위도/경도 입력</button>
        </div>

        <!-- 주소 패널 -->
        <div class="search-panel active" id="panel-address">
          <div class="input-group">
            <div class="input-wrap" style="flex: 3">
              <label>주소 (한국어 또는 영어)</label>
              <input type="text" id="input-address"
                placeholder="예: 포항시 남구, Shanghai China, London UK"
                autocomplete="off">
            </div>
            <button class="btn-primary" id="btn-geocode">🔍 조회</button>
          </div>
        </div>

        <!-- 위도경도 패널 -->
        <div class="search-panel" id="panel-latlon">
          <div class="input-group">
            <div class="input-wrap">
              <label>위도 (Latitude)</label>
              <input type="number" id="input-lat" placeholder="예: 36.0095" step="0.0001" min="-90" max="90">
            </div>
            <div class="input-wrap">
              <label>경도 (Longitude)</label>
              <input type="number" id="input-lon" placeholder="예: 129.3435" step="0.0001" min="-180" max="180">
            </div>
            <button class="btn-primary" id="btn-latlon">🔍 조회</button>
          </div>
        </div>

        <!-- OCI 빠른 선택 -->
        <div class="quick-sites">
          <div class="quick-sites-label">기존 OCI 사업장 빠른 선택</div>
          <div class="site-chips" id="site-chips"></div>
        </div>
      </div>

      <!-- Status Bar -->
      <div id="status-bar"></div>
    </div>
  </section>

  <!-- ── Results ─────────────────────────────────────────── -->
  <section id="results">
    <div class="container">

      <!-- Tier Banner -->
      <div id="tier-banner" class="tier-banner"></div>

      <!-- Results Grid -->
      <div class="results-grid">

        <!-- RAG 히트맵 -->
        <div class="card card-full">
          <div class="card-title">
            🌡️ RAG 기후 위험 히트맵 (38동인 × 9시점)
          </div>
          <div class="ssp-tabs" id="heatmap-ssp-tabs">
            <button class="ssp-tab active" data-ssp="ssp585">SSP5-8.5</button>
            <button class="ssp-tab" data-ssp="ssp370">SSP3-7.0</button>
            <button class="ssp-tab" data-ssp="ssp245">SSP2-4.5</button>
            <button class="ssp-tab" data-ssp="ssp126">SSP1-2.6</button>
          </div>
          <div class="heatmap-container">
            <table class="heatmap-table" id="heatmap-table">
              <thead id="heatmap-head"></thead>
              <tbody id="heatmap-body"></tbody>
            </table>
          </div>
        </div>

        <!-- SSP 시계열 차트 -->
        <div class="card">
          <div class="card-title">📈 SSP 시계열</div>
          <div style="margin-bottom: 12px;">
            <select id="chart-var-select" style="
              background: #0f1117; border: 1px solid var(--card-border);
              border-radius: 6px; padding: 6px 10px;
              color: var(--text); font-size: 12px; width: 100%;">
              <option value="tasmax">최고기온 (tasmax)</option>
              <option value="tas">평균기온 (tas)</option>
              <option value="pr">강수량 (pr)</option>
              <option value="sfcWind">지표풍속 (sfcWind)</option>
              <option value="heat_stress">열 스트레스</option>
              <option value="flood_risk">홍수 위험</option>
            </select>
          </div>
          <div class="chart-wrap">
            <canvas id="timeseries-chart"></canvas>
          </div>
        </div>

        <!-- 위치 지도 -->
        <div class="card">
          <div class="card-title">📍 위치</div>
          <div id="map"></div>
        </div>

        <!-- Top5 리스크 카드 -->
        <div class="card">
          <div class="card-title">🔴 Top 5 고위험 항목 (SSP5-8.5 말기)</div>
          <div class="top5-list" id="top5-list"></div>
        </div>

      </div><!-- /results-grid -->

      <!-- Excel 다운로드 -->
      <div class="excel-section">
        <button class="btn-excel" id="btn-excel">
          📊 Excel 다운로드 (4SSP × 모든 시점)
        </button>
      </div>

    </div>
  </section>
</main>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<script src="api.js"></script>
<script src="geocoding.js"></script>
<script src="heatmap.js"></script>
<script src="chart_render.js"></script>
<script src="map_render.js"></script>
<script src="excel_export.js"></script>
<script src="app.js"></script>

</body>
</html>
